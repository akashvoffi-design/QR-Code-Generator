<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  <rect width="64" height="64" fill="none"/>
  
  <!-- Top-left QR corner (position marker) -->
  <rect x="6" y="6" width="14" height="14" fill="#2563eb"/>
  <rect x="8" y="8" width="10" height="10" fill="white"/>
  <rect x="10" y="10" width="6" height="6" fill="#2563eb"/>
  
  <!-- Top-right QR corner -->
  <rect x="44" y="6" width="14" height="14" fill="#2563eb"/>
  <rect x="46" y="8" width="10" height="10" fill="white"/>
  <rect x="48" y="10" width="6" height="6" fill="#2563eb"/>
  
  <!-- Bottom-left QR corner -->
  <rect x="6" y="44" width="14" height="14" fill="#2563eb"/>
  <rect x="8" y="46" width="10" height="10" fill="white"/>
  <rect x="10" y="48" width="6" height="6" fill="#2563eb"/>
  
  <!-- Timing pattern (horizontal) -->
  <rect x="22" y="10" width="2" height="2" fill="#2563eb"/>
  <rect x="26" y="10" width="2" height="2" fill="#2563eb"/>
  <rect x="30" y="10" width="2" height="2" fill="#2563eb"/>
  <rect x="34" y="10" width="2" height="2" fill="#2563eb"/>
  <rect x="38" y="10" width="2" height="2" fill="#2563eb"/>
  
  <!-- Timing pattern (vertical) -->
  <rect x="10" y="22" width="2" height="2" fill="#2563eb"/>
  <rect x="10" y="26" width="2" height="2" fill="#2563eb"/>
  <rect x="10" y="30" width="2" height="2" fill="#2563eb"/>
  <rect x="10" y="34" width="2" height="2" fill="#2563eb"/>
  <rect x="10" y="38" width="2" height="2" fill="#2563eb"/>
  
  <!-- Center data area with link symbol -->
  <!-- Link symbol: curved chain-like shape using circles and connectors -->
  <circle cx="32" cy="32" r="10" fill="none" stroke="#2563eb" stroke-width="2"/>
  
  <!-- Link connector top -->
  <path d="M 32 22 L 32 18" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Link connector bottom -->
  <path d="M 32 42 L 32 46" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Small accent dots in center for depth -->
  <circle cx="28" cy="32" r="1.5" fill="#2563eb"/>
  <circle cx="36" cy="32" r="1.5" fill="#2563eb"/>
  <circle cx="32" cy="28" r="1.5" fill="#2563eb"/>
  <circle cx="32" cy="36" r="1.5" fill="#2563eb"/>
  
  <!-- QR data blocks (scattered pattern for visual interest) -->
  <rect x="24" y="20" width="2" height="2" fill="#2563eb"/>
  <rect x="28" y="24" width="2" height="2" fill="#2563eb"/>
  <rect x="36" y="20" width="2" height="2" fill="#2563eb"/>
  <rect x="40" y="24" width="2" height="2" fill="#2563eb"/>
  <rect x="24" y="40" width="2" height="2" fill="#2563eb"/>
  <rect x="28" y="36" width="2" height="2" fill="#2563eb"/>
  <rect x="36" y="40" width="2" height="2" fill="#2563eb"/>
  <rect x="40" y="36" width="2" height="2" fill="#2563eb"/>
</svg>